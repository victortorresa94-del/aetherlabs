<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family:'Advercase'; src:url('../fonts/Advercase.otf') format('opentype'); font-weight:400; }
  body { margin:0; background:#F8F8F5; padding:20px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<!-- Featured dark card -->
<div style="background:#111;border-radius:16px;padding:40px 44px;display:grid;grid-template-columns:1fr auto;gap:32px;align-items:center;margin-bottom:12px;">
  <div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <div style="width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F5F5F0" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <span style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.4);">08 · Flagship</span>
    </div>
    <div style="font-family:'Advercase','Playfair Display',Georgia,serif;font-size:36px;font-weight:400;color:#F5F5F0;letter-spacing:-0.02em;line-height:1.05;margin-bottom:2px;">AI Team</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:#6366F1;margin-bottom:12px;">Lab</div>
    <p style="font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;color:rgba(245,245,240,0.45);line-height:1.6;max-width:480px;font-style:italic;margin:0;">¿No sabes por dónde empezar mientras tu competencia ya lleva ventaja?</p>
  </div>
  <div style="text-align:right;flex-shrink:0;">
    <div style="font-family:'DM Sans',sans-serif;font-size:13px;color:#F5F5F0;margin-bottom:6px;">Auditoría gratuita ↗</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,0.25);letter-spacing:0.1em;">Desde 1.200€/mes · Sin permanencia</div>
  </div>
</div>

<!-- Glass card on dark -->
<div style="background:#080808;border-radius:16px;padding:20px;display:flex;gap:12px;">
  <div style="background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:24px;flex:1;">
    <div style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:#555;margin-bottom:8px;">Glass card — dark bg</div>
    <div style="font-family:'Advercase','Playfair Display',serif;font-size:18px;color:#F5F5F0;letter-spacing:-0.02em;">Software Lab</div>
    <div style="font-family:'DM Sans',sans-serif;font-size:12px;font-weight:300;color:rgba(245,245,240,0.4);margin-top:6px;">Construimos software a medida con IA.</div>
  </div>
  <div style="background:#EDE8DF;border-radius:16px;padding:24px;flex:1;">
    <div style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:#999;margin-bottom:8px;">Warm card</div>
    <div style="font-family:'Advercase','Playfair Display',serif;font-size:18px;color:#1A1A18;letter-spacing:-0.02em;">Editorial</div>
    <div style="font-family:'DM Sans',sans-serif;font-size:12px;font-weight:300;color:#666;margin-top:6px;">Cream bg. Used for 3D object contexts.</div>
  </div>
</div>
</body>
</html>
