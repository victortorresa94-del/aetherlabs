<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  body { margin:0; background:#F8F8F5; padding:20px; font-family:'JetBrains Mono',monospace; }
  .label { font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:#aaa; margin-bottom:6px; }
  .row { display:flex; align-items:flex-end; gap:16px; margin-bottom:20px; }
  .box { background:#E0E0DA; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .val { font-size:9px; color:#888; margin-top:4px; text-align:center; }
  .rad-label { font-size:8px; color:#aaa; }
</style>
</head>
<body>

<div class="label">Border Radii</div>
<div class="row">
  <div>
    <div class="box" style="width:40px;height:40px;border-radius:4px;"></div>
    <div class="val">sm<br>4–6px</div>
  </div>
  <div>
    <div class="box" style="width:56px;height:56px;border-radius:12px;"></div>
    <div class="val">md<br>12px</div>
  </div>
  <div>
    <div class="box" style="width:72px;height:72px;border-radius:16px;"></div>
    <div class="val">lg<br>16px</div>
  </div>
  <div>
    <div class="box" style="width:88px;height:88px;border-radius:20px;"></div>
    <div class="val">xl<br>20px max</div>
  </div>
  <div>
    <div class="box" style="width:48px;height:40px;border-radius:100px;"></div>
    <div class="val">pill<br>100px</div>
  </div>
  <div>
    <div class="box" style="width:88px;height:40px;border-radius:0;"></div>
    <div class="val">square<br>0 — CTA</div>
  </div>
</div>

<div class="label">Spacing Scale (Section / Container)</div>
<div style="display:flex;gap:8px;align-items:flex-end;">
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div style="background:#6366F1;width:12px;height:24px;border-radius:2px;opacity:0.6;"></div>
    <div style="font-size:8px;color:#aaa;margin-top:3px;">24px<br>mobile pad</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div style="background:#6366F1;width:12px;height:32px;border-radius:2px;opacity:0.7;"></div>
    <div style="font-size:8px;color:#aaa;margin-top:3px;">32px<br>container</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div style="background:#6366F1;width:12px;height:40px;border-radius:2px;opacity:0.75;"></div>
    <div style="font-size:8px;color:#aaa;margin-top:3px;">40px<br>inner card</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div style="background:#6366F1;width:12px;height:52px;border-radius:2px;opacity:0.85;"></div>
    <div style="font-size:8px;color:#aaa;margin-top:3px;">52px<br>card hero</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div style="background:#6366F1;width:12px;height:80px;border-radius:2px;opacity:0.9;"></div>
    <div style="font-size:8px;color:#aaa;margin-top:3px;">80px<br>mobile sec.</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div style="background:#6366F1;width:12px;height:120px;border-radius:2px;"></div>
    <div style="font-size:8px;color:#aaa;margin-top:3px;">120px<br>section pad</div>
  </div>
</div>
</body>
</html>
