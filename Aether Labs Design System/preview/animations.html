<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=DM+Sans:opsz,wght@9..40,300&display=swap" rel="stylesheet">
<style>
  body { margin:0; background:#080808; padding:24px; }
  .lbl { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:#444; margin-bottom:8px; }

  @keyframes revealIn {
    from { opacity:0; transform:translateY(30px) scale(0.97); filter:blur(4px); }
    to   { opacity:1; transform:none; filter:none; }
  }
  @keyframes float-orb {
    0%,100% { transform:translate(0,0) scale(1); }
    33% { transform:translate(20px,-20px) scale(1.05); }
    66% { transform:translate(-15px,15px) scale(0.95); }
  }
  @keyframes shimmer {
    0% { background-position:-200% center; }
    100% { background-position:200% center; }
  }

  .reveal-demo { animation: revealIn 0.8s cubic-bezier(0.16,1,0.3,1) forwards; }
  .orb { width:60px; height:60px; border-radius:50%; background:radial-gradient(circle, rgba(99,102,241,0.4) 0%, transparent 70%); animation:float-orb 8s ease-in-out infinite; }
  .shimmer-text {
    background:linear-gradient(90deg,#F5F5F0 0%,#666 50%,#F5F5F0 100%);
    background-size:200% auto;
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    animation:shimmer 3s linear infinite;
    font-family:'DM Sans',sans-serif; font-size:24px; font-weight:300;
  }
</style>
</head>
<body>
<div class="lbl">Scroll Reveal — cubic-bezier(0.16, 1, 0.3, 1)</div>
<div class="reveal-demo" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;margin-bottom:16px;">
  <div style="font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;color:rgba(245,245,240,0.6);">opacity 0→1 · translateY(30px→0) · blur(4px→0)</div>
</div>

<div class="lbl">Shimmer text (gradient on dark)</div>
<div class="shimmer-text" style="margin-bottom:16px;">Implementamos IA.</div>

<div class="lbl">Float orb (bg decoration)</div>
<div class="orb"></div>

<div style="margin-top:16px;">
  <div class="lbl">Easing reference</div>
  <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#555;line-height:1.8;">
    --al-ease: cubic-bezier(0.16, 1, 0.3, 1)<br>
    Hover: 200ms · Reveal: 800ms · Enter: 550ms
  </div>
</div>
</body>
</html>
