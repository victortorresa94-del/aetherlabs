<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  body { margin:0; background:#F8F8F5; padding:24px; display:flex; flex-wrap:wrap; gap:12px; align-items:flex-start; }
  .item { display:flex; flex-direction:column; align-items:flex-start; gap:6px; }
  .lbl { font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:0.1em; text-transform:uppercase; color:#bbb; }
</style>
</head>
<body>
<div class="item">
  <div class="lbl">Lab accent</div>
  <span style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:#6366F1;">Lab</span>
</div>

<div class="item">
  <div class="lbl">Badge outline</div>
  <span style="font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:#888;border:1px solid #ddd;padding:3px 7px;border-radius:4px;">Más demandado</span>
</div>

<div class="item">
  <div class="lbl">Hot badge</div>
  <span style="font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:0.1em;text-transform:uppercase;background:#111;color:#fff;padding:2px 5px;border-radius:3px;">Hot</span>
</div>

<div class="item">
  <div class="lbl">Floating pill</div>
  <span style="background:rgba(12,12,12,0.70);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:8px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.58);">AI · Generativo</span>
</div>

<div class="item">
  <div class="lbl">Section eyebrow</div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#888;">Laboratorios</span>
    <span style="width:32px;height:1px;background:#ccc;display:inline-block;"></span>
    <span style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:#aaa;">8 capacidades</span>
  </div>
</div>

<div class="item" style="width:100%">
  <div class="lbl">Social icons (footer)</div>
  <div style="display:flex;gap:8px;">
    <div style="width:36px;height:36px;border-radius:8px;border:1px solid rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:center;color:#999;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
    </div>
    <div style="width:36px;height:36px;border-radius:8px;border:1px solid rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:center;color:#999;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
    </div>
  </div>
</div>
</body>
</html>
