<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #F8F8F5; font-family: 'JetBrains Mono', monospace; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px; }
  .swatch { border-radius: 8px; height: 64px; }
  .label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-top: 5px; line-height: 1.4; }
  .val { font-size: 10px; color: #333; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .item { flex: 1; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="swatch" style="background:#080808; border: 1px solid #ddd"></div><div class="label">bg-dark<br><span class="val">#080808</span></div></div>
  <div class="item"><div class="swatch" style="background:#111111; border: 1px solid #ddd"></div><div class="label">bg-dark-2<br><span class="val">#111111</span></div></div>
  <div class="item"><div class="swatch" style="background:#F8F8F5; border: 1px solid #ddd"></div><div class="label">bg-light<br><span class="val">#F8F8F5</span></div></div>
  <div class="item"><div class="swatch" style="background:#FFFFFF; border: 1px solid #ddd"></div><div class="label">bg-white<br><span class="val">#FFFFFF</span></div></div>
  <div class="item"><div class="swatch" style="background:#EDE8DF; border: 1px solid #ddd"></div><div class="label">bg-warm<br><span class="val">#EDE8DF</span></div></div>
</div>
<div class="row">
  <div class="item"><div class="swatch" style="background:#F5F5F0; border:1px solid #ddd"></div><div class="label">text-primary<br><span class="val">#F5F5F0</span></div></div>
  <div class="item"><div class="swatch" style="background:rgba(245,245,240,0.55); border:1px solid #ddd"></div><div class="label">text-secondary<br><span class="val">55% white</span></div></div>
  <div class="item"><div class="swatch" style="background:#111111; border:1px solid #ddd"></div><div class="label">text-on-light<br><span class="val">#111111</span></div></div>
  <div class="item"><div class="swatch" style="background:#6366F1; border:1px solid #ddd"></div><div class="label">accent-indigo<br><span class="val">#6366F1</span></div></div>
  <div class="item"><div class="swatch" style="background:#00FF41; border:1px solid #ddd"></div><div class="label">accent-green<br><span class="val">#00FF41</span></div></div>
</div>
</body>
</html>
