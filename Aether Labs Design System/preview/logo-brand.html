<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  body { margin:0; display:flex; gap:0; }
  .half { padding:24px; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
  .lbl { font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:0.12em; text-transform:uppercase; }
</style>
</head>
<body>
<div class="half" style="background:#080808;">
  <img src="../assets/aether-logo-white.png" height="30" style="object-fit:contain;">
  <div class="lbl" style="color:#333;">White — on dark</div>
  <img src="../assets/logo-pixel.png" height="36" style="object-fit:contain;margin-top:8px;">
  <div class="lbl" style="color:#333;">Pixel variant</div>
</div>
<div class="half" style="background:#F8F8F5;">
  <img src="../assets/aether-logo-white.png" height="30" style="object-fit:contain;filter:invert(1);">
  <div class="lbl" style="color:#bbb;">Inverted — on light</div>
  <img src="../assets/aether-logo-new.png" height="36" style="object-fit:contain;margin-top:8px;">
  <div class="lbl" style="color:#bbb;">New variant</div>
</div>
</body>
</html>
