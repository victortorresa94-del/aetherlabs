<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  body { margin:0; padding:0; }
  .half { padding:24px 28px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .lbl { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.12em; text-transform:uppercase; }
</style>
</head>
<body>
<!-- Dark half -->
<div class="half" style="background:#080808;">
  <div>
    <div class="lbl" style="color:#444;margin-bottom:8px;">Primary — Square</div>
    <button style="display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:#F5F5F0;color:#080808;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:400;border:none;border-radius:0;cursor:pointer;">Auditoría gratuita →</button>
  </div>
  <div>
    <div class="lbl" style="color:#444;margin-bottom:8px;">Ghost — Pill</div>
    <button style="display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:transparent;color:rgba(255,255,255,0.55);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:400;border:1px solid rgba(255,255,255,0.18);border-radius:100px;cursor:pointer;">Ver experimentos</button>
  </div>
</div>
<!-- Light half -->
<div class="half" style="background:#F8F8F5;">
  <div>
    <div class="lbl" style="color:#bbb;margin-bottom:8px;">Primary Dark — Square</div>
    <button style="display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:#111111;color:#FFFFFF;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:400;border:none;border-radius:0;cursor:pointer;">Implementar IA →</button>
  </div>
  <div>
    <div class="lbl" style="color:#bbb;margin-bottom:8px;">Ghost — Dark Pill</div>
    <button style="display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:transparent;color:#444;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:400;border:1px solid #ccc;border-radius:100px;cursor:pointer;">Ver laboratorios</button>
  </div>
</div>
</body>
</html>
