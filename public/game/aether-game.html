<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Aether Labs</title>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050508; overflow: hidden;  }
    #game-container {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      transition: margin-left 0.3s ease;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      max-width: 100%; max-height: 100%;
    }
    .scanlines {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
      pointer-events: none; z-index: 10;
    }
    .vignette {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
      pointer-events: none; z-index: 9;
    }
    canvas { cursor: none; }
  </style>
</head>
<body>
  <div id="info-panel" style="
    position: fixed;
    left: 0; top: 0;
    width: 280px; height: 100vh;
    background: #050508;
    border-right: 2px solid #00E5FF;
    z-index: 100;
    padding: 24px;
    box-sizing: border-box;
    font-family: 'Pixelify Sans', monospace;
    transform: translateX(-280px);
    transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    box-shadow: 10px 0 30px rgba(0,0,0,0.8);
  ">
    <div style="border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; background: rgba(255,255,255,0.02); flex-grow: 1; display: flex; flex-direction: column;">
      <div id="info-panel-lab" style="font-size:10px; color:#00E5FF; margin-bottom:12px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;">CREATIVE LAB</div>
      <div id="info-panel-img" style="width:100%; aspect-ratio:4/3; background:#111; border:1px solid rgba(255,255,255,0.1); border-radius: 4px; margin-bottom:16px; overflow:hidden; display:flex; align-items:center; justify-content:center; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);"></div>
      <div id="info-panel-name" style="font-size:16px; color:#fff; margin-bottom:12px; line-height:1.4; font-weight: bold;"></div>
      <div id="info-panel-desc" style="font-size:12px; color:#AAAAAA; line-height:1.6; flex-grow: 1;"></div>
      <div id="info-panel-tags" style="margin-top:16px; margin-bottom: 24px; display:flex; flex-wrap:wrap; gap:6px;"></div>
      <a id="info-panel-cta" href="#" target="_blank" style="display: none; background: transparent; border: 1px solid #00E5FF; color: #00E5FF; padding: 12px; text-align: center; text-decoration: none; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; transition: all 0.2s; text-transform: uppercase;">VER MÁS ESTADÍSTICAS</a>
    </div>
  </div>
  <style>
    #info-panel-cta:hover { background: rgba(0,229,255,0.1) !important; box-shadow: 0 0 15px rgba(0,229,255,0.2); }
  </style>

  
  <div id="mobile-controls" style="display: none; position: fixed; bottom: 20px; left: 20px; z-index: 200; width: 120px; height: 120px; opacity: 0.6;">
    <div style="position: absolute; top: 0; left: 40px; width: 40px; height: 40px; background: rgba(0, 229, 255, 0.2); border: 2px solid #00E5FF; border-radius: 8px;" id="dpad-up"></div>
    <div style="position: absolute; bottom: 0; left: 40px; width: 40px; height: 40px; background: rgba(0, 229, 255, 0.2); border: 2px solid #00E5FF; border-radius: 8px;" id="dpad-down"></div>
    <div style="position: absolute; top: 40px; left: 0; width: 40px; height: 40px; background: rgba(0, 229, 255, 0.2); border: 2px solid #00E5FF; border-radius: 8px;" id="dpad-left"></div>
    <div style="position: absolute; top: 40px; right: 0; width: 40px; height: 40px; background: rgba(0, 229, 255, 0.2); border: 2px solid #00E5FF; border-radius: 8px;" id="dpad-right"></div>
  </div>
  <div id="mobile-action" style="display: none; position: fixed; bottom: 40px; right: 20px; z-index: 200; width: 60px; height: 60px; background: rgba(0, 229, 255, 0.2); border: 2px solid #00E5FF; border-radius: 50%; opacity: 0.6; display: flex; align-items: center; justify-content: center; color: #00E5FF; font-family: 'Pixelify Sans', monospace; font-size: 24px; font-weight: bold; -webkit-user-select: none;">A</div>

  <div id="game-container">
    <div class="scanlines"></div>
    <div class="vignette"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.88.2/phaser.min.js"></script>
  <script>

    // MOBILE CONTROLS LOGIC
    var isMobile = window.innerWidth < 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    if (isMobile) {
      document.getElementById('mobile-controls').style.display = 'block';
      document.getElementById('mobile-action').style.display = 'flex';
      document.getElementById('info-panel').style.width = '100vw'; // full width on mobile
      document.getElementById('info-panel-img').style.aspectRatio = '21/9';
    }

    // We'll set global variables that Phaser can read
    window.mobileInput = { up: false, down: false, left: false, right: false, action: false };

    function bindButton(id, key) {
      var el = document.getElementById(id);
      if(!el) return;
      el.addEventListener('touchstart', function(e) { e.preventDefault(); window.mobileInput[key] = true; el.style.background = 'rgba(0, 229, 255, 0.5)'; });
      el.addEventListener('touchend', function(e) { e.preventDefault(); window.mobileInput[key] = false; el.style.background = 'rgba(0, 229, 255, 0.2)'; });
      
      // Keep mouse events for testing on desktop resizing
      el.addEventListener('mousedown', function(e) { e.preventDefault(); window.mobileInput[key] = true; el.style.background = 'rgba(0, 229, 255, 0.5)'; });
      el.addEventListener('mouseup', function(e) { e.preventDefault(); window.mobileInput[key] = false; el.style.background = 'rgba(0, 229, 255, 0.2)'; });
      el.addEventListener('mouseleave', function(e) { e.preventDefault(); window.mobileInput[key] = false; el.style.background = 'rgba(0, 229, 255, 0.2)'; });
    }

    window.addEventListener('load', function() {
      bindButton('dpad-up', 'up');
      bindButton('dpad-down', 'down');
      bindButton('dpad-left', 'left');
      bindButton('dpad-right', 'right');
      bindButton('mobile-action', 'action');
    });

    // INFO PANEL FUNCTIONS
    function showInfoPanel(labColor, name, description, emoji, tags) {
      tags = tags || [];
      var panel = document.getElementById('info-panel');
      panel.style.borderColor = labColor;
      panel.style.transform = 'translateX(0)';
      document.getElementById('info-panel-name').textContent = name;
      document.getElementById('info-panel-desc').textContent = description;
      document.getElementById('info-panel-img').innerHTML = '<div style="font-size:48px; text-align:center;">' + emoji + '</div>';
      document.getElementById('info-panel-lab').style.color = labColor;
      var tagsEl = document.getElementById('info-panel-tags');
      tagsEl.innerHTML = tags.map(function(t) {
        return '<span style="font-size:5px; padding:2px 4px; border:1px solid ' + labColor + '; color:' + labColor + ';">' + t + '</span>';
      }).join('');
    }
    function hideInfoPanel() {
      document.getElementById('info-panel').style.transform = 'translateX(-280px)';
    }

    // AUDIO ENGINE
    // ─────────────────────────────────────────────
    var audioCtx = null;
    document.addEventListener('click', function() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }, { once: true });

    function playNote(freq, duration, type, gain, delay) {
      type = type || 'square'; gain = gain || 0.3; delay = delay || 0;
      if (!audioCtx) return;
      var osc = audioCtx.createOscillator();
      var gainNode = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime + delay);
      gainNode.gain.setValueAtTime(gain, audioCtx.currentTime + delay);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + duration);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start(audioCtx.currentTime + delay);
      osc.stop(audioCtx.currentTime + delay + duration);
    }

        gfx.fillStyle(0xffffff, 0.015);

      gfx.strokeRect(x+1, y+1, 30, 30);
      gfx.fillStyle(0xffffff, 0.08);
      gfx.fillRect(x, y, 2, 2);

    function drawWallTile(gfx, x, y, wallColor) {
      gfx.fillStyle(wallColor || 0x0d0d1a);
      gfx.fillRect(x, y, 32, 32);

      gfx.fillStyle(0x000000, 0.5);
      gfx.fillRect(x, y+24, 32, 8);

      gfx.fillStyle(0xffffff, 0.03);
      gfx.fillRect(x+2, y+2, 28, 10);
      gfx.fillRect(x+2, y+14, 28, 8);

      gfx.lineStyle(1, 0x000000, 0.4);
      gfx.lineBetween(x+2, y+6, x+30, y+6);
      gfx.lineBetween(x+2, y+10, x+30, y+10);
      
      gfx.lineStyle(1, 0xffffff, 0.05);
      gfx.lineBetween(x, y, x+32, y);
      gfx.lineBetween(x, y, x, y+32);
    }
    
    function drawCarpet(gfx, x, y, w, h, labColorInt) {
      gfx.fillStyle(0x000000, 0.4);
      gfx.fillRect(x+3, y+3, w, h); // drop shadow
      
      gfx.fillStyle(0x1a1a2e, 1);
      gfx.fillRect(x, y, w, h);
      
      gfx.lineStyle(2, labColorInt, 0.7);
      gfx.strokeRect(x, y, w, h);
      
      gfx.lineStyle(1, labColorInt, 0.2);
      gfx.strokeRect(x+6, y+6, w-12, h-12);
      
      gfx.fillStyle(labColorInt, 0.9);
      var nodes = [[x-2,y-2],[x+w-2,y-2],[x-2,y+h-2],[x+w-2,y+h-2]];
      nodes.forEach(function(n) { gfx.fillRect(n[0], n[1], 4, 4); });
    }

    function drawServiceCard(gfx, x, y, labColorInt) {
      gfx.fillStyle(0x111122);
      gfx.fillRect(x, y, 40, 48);
      gfx.lineStyle(2, labColorInt);
      gfx.strokeRect(x, y, 40, 48);
      gfx.fillStyle(labColorInt, 0.15);
      gfx.fillRect(x+2, y+2, 36, 20);
      gfx.fillStyle(labColorInt);
      gfx.fillRect(x+14, y+8, 12, 8);
      gfx.fillStyle(0x1a1a2e);
      gfx.fillRect(x+2, y+26, 36, 4);
      gfx.fillStyle(0x2a2a3e);
      gfx.fillRect(x+2, y+32, 36, 4);
      gfx.fillRect(x+2, y+38, 24, 4);
      gfx.fillStyle(labColorInt, 0.3);
      gfx.fillRect(x, y, 4, 4);
      gfx.fillRect(x+36, y+44, 4, 4);
    }

    function drawTestimonialStand(gfx, x, y, labColorInt) {
      gfx.fillStyle(0x0d1520);
      gfx.fillRect(x+4, y+32, 32, 8);
      gfx.fillRect(x+8, y+24, 24, 8);
      gfx.fillStyle(0x0a1428);
      gfx.fillRect(x+4, y+0, 32, 22);
      gfx.lineStyle(2, labColorInt);
      gfx.strokeRect(x+4, y+0, 32, 22);
      gfx.fillStyle(labColorInt, 0.7);
      gfx.fillRect(x+8, y+4, 20, 2);
      gfx.fillStyle(0x888888, 0.5);
      gfx.fillRect(x+8, y+8, 24, 2);
      gfx.fillRect(x+8, y+12, 18, 2);
    }

    function drawProcessStep(gfx, x, y, stepNum, labColorInt) {
      gfx.fillStyle(labColorInt, 0.2);
      gfx.fillCircle(x+20, y+20, 18);
      gfx.lineStyle(2, labColorInt);
      gfx.strokeCircle(x+20, y+20, 18);
      gfx.fillStyle(labColorInt);
      if(stepNum === 1) {
        gfx.fillRect(x+18, y+12, 4, 16);
      } else if(stepNum === 2) {
        gfx.fillRect(x+14, y+12, 12, 4);
        gfx.fillRect(x+22, y+16, 4, 6);
        gfx.fillRect(x+14, y+22, 12, 4);
        gfx.fillRect(x+14, y+26, 4, 6);
        gfx.fillRect(x+14, y+32, 12, 4);
      } else {
        gfx.fillRect(x+14, y+12, 12, 4);
        gfx.fillRect(x+22, y+16, 4, 6);
        gfx.fillRect(x+14, y+22, 12, 4);
        gfx.fillRect(x+22, y+26, 4, 6);
        gfx.fillRect(x+14, y+32, 12, 4);
      }
      if(stepNum < 3) {
        gfx.lineStyle(1, labColorInt, 0.4);
        gfx.lineBetween(x+38, y+20, x+70, y+20);
      }
    }

    function drawZoneLabel(scene, rowY, text, labColorInt, labColorStr) {
      var bg = scene.add.rectangle(400, rowY*32+16, 800, 20, 0x000000, 0.7).setScrollFactor(1).setDepth(3);
      var leftLine = scene.add.rectangle(20, rowY*32+16, 30, 2, labColorInt, 0.8).setScrollFactor(1).setDepth(3);
      var rightLine = scene.add.rectangle(780, rowY*32+16, 30, 2, labColorInt, 0.8).setScrollFactor(1).setDepth(3);
      var label = scene.add.text(400, rowY*32+16, '-- ' + text + ' --', {
        fontFamily: '"Pixelify Sans"',
        fontSize: '6px',
        color: labColorStr
      }).setOrigin(0.5).setScrollFactor(1).setDepth(4).setAlpha(0.9);
    }


    function drawServerRack(gfx, x, y, labColorInt) {
      gfx.fillStyle(0x0a0a14);
      gfx.fillRect(x, y, 32, 48);
      gfx.fillStyle(0x000000, 0.6);
      gfx.fillRect(x, y+40, 32, 8);
      gfx.fillStyle(0x1a1a2e);
      gfx.fillRect(x+2, y+2, 28, 44);
      gfx.lineStyle(2, 0x050508);
      gfx.strokeRect(x+2, y+2, 28, 44);
      for(var i=0; i<4; i++) {
        gfx.fillStyle(0x050508);
        gfx.fillRect(x+6, y+8+i*8, 20, 4);
        if(Math.random()>0.3) {
          gfx.fillStyle(labColorInt, 0.8);
          gfx.fillRect(x+8, y+9+i*8, 4, 2);
        }
        if(Math.random()>0.5) {
          gfx.fillStyle(0xffffff, 0.6);
          gfx.fillRect(x+14, y+9+i*8, 2, 2);
        }
      }
    }

    function drawPottedPlant(gfx, x, y, labColorInt) {
      gfx.fillStyle(0x111122);
      gfx.fillRect(x+8, y+20, 16, 12);
      gfx.lineStyle(1, labColorInt, 0.5);
      gfx.strokeRect(x+8, y+20, 16, 12);
      gfx.fillStyle(labColorInt, 0.7);
      gfx.fillCircle(x+16, y+14, 8);
      gfx.fillStyle(labColorInt, 0.9);
      gfx.fillCircle(x+10, y+10, 6);
      gfx.fillCircle(x+22, y+12, 5);
      gfx.fillCircle(x+16, y+6, 6);
    }
    // ─────────────────────────────────────────────
    // BASE MAP SCENE
    // ─────────────────────────────────────────────
    class BaseMapScene extends Phaser.Scene {
      constructor(key) { super(key); }

      initConfig(cfg) {
        this.labName=cfg.labName; this.labColor=cfg.labColor; this.labColorHex=cfg.labColorHex;
        this.floorColor=cfg.floorColor; this.wallColor=cfg.wallColor; this.accentColor=cfg.accentColor;
        this.mapData=cfg.mapData; this.npcDefs=cfg.npcDefs; this.chestData=cfg.chestData;
        this.playerStartTile=cfg.playerStartTile; this.chestTile=cfg.chestTile;
        this.zoneDefs=cfg.zoneDefs||[];
        this.mapObjects=cfg.mapObjects||[];
      }

      create() {
        var T=32, H=24, C=25, R=18;
        var self = this;

        // Draw tiles with depth
        var mg = this.add.graphics().setDepth(0);
        for (var r=0; r<R; r++) {
          for (var c=0; c<C; c++) {
            var t=this.mapData[r][c], x=c*T, y=r*T+H;
            if (t===0) {
              drawFloorTile(mg, x, y, this.labColorHex, this.floorColor, r, c);
            } else if (t===1) {
              drawWallTile(mg, x, y, this.wallColor);
            } else if (t===3) {
              drawFloorTile(mg, x, y, this.labColorHex, this.floorColor, r, c);
              drawServerRack(mg, x, y-16, this.labColorHex);
            } else if (t===4) {
              drawFloorTile(mg, x, y, this.labColorHex, this.floorColor, r, c);
              drawPottedPlant(mg, x, y, this.labColorHex);
            }
          }
        }
        mg.lineStyle(2, this.labColorHex, 0.4);
        mg.strokeRect(0, H, C*T, R*T);
        
        // Decorations & Carpets
        var cg = this.add.graphics().setDepth(1);
        drawCarpet(cg, this.chestTile[0]*T-32, this.chestTile[1]*T-16+H, 96, 64, this.labColorHex);
        var self=this;
        this.mapObjects.forEach(function(obj) {
            drawCarpet(cg, obj.x-40, obj.y-36+H, 80, 80, self.labColorHex);
        });

        // Zone labels
        this.zoneDefs.forEach(function(zd) {
          drawZoneLabel(self, zd.row, zd.label, self.labColorHex, self.labColor);
        });

        // Wall colliders
        this.wallGroup = this.physics.add.staticGroup();
        for (var r=0; r<R; r++) {
          for (var c=0; c<C; c++) {
            if (this.mapData[r][c]===1 || this.mapData[r][c]===3 || this.mapData[r][c]===4) {
              var wr = this.add.rectangle(c*T+16, r*T+16+H, T, T).setVisible(false);
              this.physics.add.existing(wr, true);
              this.wallGroup.add(wr);
            }
          }
        }

        // Draw map objects (decorative graphics)
        var ogfx = this.add.graphics().setDepth(2);
        this.mapObjects.forEach(function(obj) {
          var ox = obj.x - 20, oy = obj.y - 24 + H;
          if(obj.type === 'service_card') {
            drawServiceCard(ogfx, ox, oy, self.labColorHex);
          } else if(obj.type === 'testimonial') {
            drawTestimonialStand(ogfx, ox, oy, self.labColorHex);
          } else if(obj.type === 'process_step') {
            drawProcessStep(ogfx, ox, oy, obj.stepNum||1, self.labColorHex);
          } else if(obj.type === 'welcome_sign') {
            ogfx.fillStyle(0x0a0a1a);
            ogfx.fillRect(ox-20, oy+4, 80, 28);
            ogfx.lineStyle(2, self.labColorHex);
            ogfx.strokeRect(ox-20, oy+4, 80, 28);
            ogfx.fillStyle(self.labColorHex, 0.15);
            ogfx.fillRect(ox-18, oy+6, 76, 24);
          }
        });

        // Interactive object zones
        this.mapObjectZones = [];
        this.mapObjectBubbles = [];
        this.mapObjects.forEach(function(obj, idx) {
          var ox = obj.x, oy = obj.y + H;
          var zone = self.add.zone(ox, oy, 56, 56);
          self.physics.add.existing(zone, false);
          zone.body.setAllowGravity(false);
          zone.objIndex = idx;
          self.mapObjectZones.push(zone);
          // Small indicator dot
          var dot = self.add.graphics().setDepth(5);
          dot.fillStyle(self.labColorHex, 0.9);
          dot.fillRect(ox-3, oy-40, 6, 6);
          self.mapObjectBubbles.push(dot);
        });

        // Player
        var px=this.playerStartTile[0]*T+16, py=this.playerStartTile[1]*T+16+H;
        this.player = this.physics.add.sprite(px, py, 'player', 0).setScale(2).setDepth(5);
        this.player.setCollideWorldBounds(true);
        this.player.body.setSize(12, 16);
        this.physics.add.collider(this.player, this.wallGroup);

        this.cameras.main.setBounds(0, 0, C*T, R*T+H);
        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

        this.cursors = this.input.keyboard.createCursorKeys();
        this.wasd = this.input.keyboard.addKeys({W:Phaser.Input.Keyboard.KeyCodes.W,A:Phaser.Input.Keyboard.KeyCodes.A,S:Phaser.Input.Keyboard.KeyCodes.S,D:Phaser.Input.Keyboard.KeyCodes.D});
        this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
        this.escKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);

        // Dialogue state
        this.dialogueOpen=false; this.dialoguePage=0; this.dialogueTyping=false;
        this.dialogueTarget=''; this.dialogueCharIdx=0; this.dialogueSeen={};
        this.activeNpcIdx=-1; this.activeObjIdx=-1;
        this.npcCount=0; this.totalNpcs=this.npcDefs.length + this.mapObjects.length;

        // NPCs
        this.npcs=[]; this.npcZones=[]; this.npcBubbles=[];
        this.npcDefs.forEach(function(def, idx) {
          var nx=def.tile[0]*T+16, ny=def.tile[1]*T+16+H;
          var npc = self.physics.add.staticSprite(nx, ny, def.key).setScale(2).setDepth(4);
          self.npcs.push(npc);
          var bub = self.add.sprite(nx, ny-28, 'bubble', 0).setScale(2).setDepth(6).setVisible(false);
          self.npcBubbles.push(bub);
          var zone = self.add.zone(nx, ny, 48, 48);
          self.physics.add.existing(zone, false);
          zone.body.setAllowGravity(false);
          zone.npcIndex = idx;
          self.npcZones.push(zone);
        });

        // Chest
        var cx=this.chestTile[0]*T+16, cy=this.chestTile[1]*T+16+H;
        this.chest = this.physics.add.staticSprite(cx, cy, 'chest_creative', 0).setScale(2).setDepth(4);
        this.chest.play('chest_idle');
        this.chestLocked=true; this.chestOpened=false;
        this.chestZone = this.add.zone(cx, cy, 64, 64);
        this.physics.add.existing(this.chestZone, false);
        this.chestZone.body.setAllowGravity(false);
        this.chestPrompt = this.add.text(cx, cy-50, '[ESPACIO]', {fontFamily:'"Pixelify Sans"',fontSize:'6px',color:this.labColor}).setScrollFactor(1).setDepth(10).setOrigin(0.5).setVisible(false);

        // Dialogue UI (camera-fixed)
        this.dlgPanel = this.add.graphics().setScrollFactor(0).setDepth(20).setVisible(false);
        this.dlgText = this.add.text(30, 510, '', {fontFamily:'"Pixelify Sans"',fontSize:'7px',color:'#ffffff',wordWrap:{width:740},lineSpacing:10}).setScrollFactor(0).setDepth(21).setVisible(false);
        this.dlgArrow = this.add.text(760, 570, '>', {fontFamily:'"Pixelify Sans"',fontSize:'8px',color:this.labColor}).setScrollFactor(0).setDepth(21).setVisible(false);
        this.tweens.add({ targets:this.dlgArrow, alpha:0, duration:400, yoyo:true, repeat:-1 });
        this.npcNameText = this.add.text(30, 502, '', {fontFamily:'"Pixelify Sans"',fontSize:'6px',color:this.labColor}).setScrollFactor(0).setDepth(21).setVisible(false);

        // HUD
        this.createHUD();

        this.escKey.on('down', function() {
          if (self.dialogueOpen) return;
          hideInfoPanel();
          self.cameras.main.fadeOut(200,0,0,0);
          self.cameras.main.once('camerafadeoutcomplete', function() {
            self.scene.stop('ChestScene');
            self.scene.start('LabSelectScene');
          });
        });

        this.nearNpc=-1; this.nearObj=-1; this.stepTimer=0;
        this.cameras.main.fadeIn(300,0,0,0);
      }

      createHUD() {
        var self = this;
        var hgfx = this.add.graphics().setScrollFactor(0).setDepth(30);
        hgfx.fillStyle(0x050508,1); hgfx.fillRect(0,0,800,24);
        hgfx.lineStyle(1,this.labColorHex,0.5); hgfx.lineBetween(0,24,800,24);
        this.add.text(8,6,'AL',{fontFamily:'"Pixelify Sans"',fontSize:'8px',color:'#00E5FF'}).setScrollFactor(0).setDepth(31);
        this.add.text(32,6,'|',{fontFamily:'"Pixelify Sans"',fontSize:'8px',color:'#222244'}).setScrollFactor(0).setDepth(31);
        this.add.text(44,6,this.labName,{fontFamily:'"Pixelify Sans"',fontSize:'7px',color:this.labColor}).setScrollFactor(0).setDepth(31);
        var barBg = this.add.graphics().setScrollFactor(0).setDepth(31);
        barBg.fillStyle(0x1a1a2e,1); barBg.fillRect(480,6,200,12);
        barBg.lineStyle(1,this.labColorHex,0.4); barBg.strokeRect(480,6,200,12);
        this.hudBar = this.add.graphics().setScrollFactor(0).setDepth(32);
        this.hudNpcText = this.add.text(695,6,'0/'+this.totalNpcs,{fontFamily:'"Pixelify Sans"',fontSize:'7px',color:this.labColor}).setScrollFactor(0).setDepth(32);
        this.add.text(750,6,'[ESC]',{fontFamily:'"Pixelify Sans"',fontSize:'6px',color:'#334455'}).setScrollFactor(0).setDepth(32);
        this.updateHudBar();
      }

      updateHudBar() {
        this.hudBar.clear();
        var w = this.totalNpcs>0 ? Math.floor(200*this.npcCount/this.totalNpcs) : 0;
        this.hudBar.fillStyle(this.labColorHex, 0.8);
        this.hudBar.fillRect(480, 6, w, 12);
      }

      openDialogue(idx, isObj) {
        var def = isObj ? this.mapObjects[idx] : this.npcDefs[idx];
        if(!def) return;
        this.dialogueOpen=true;
        this.activeNpcIdx = isObj ? -1 : idx;
        this.activeObjIdx = isObj ? idx : -1;
        this.dialoguePage=0;
        this.player.setVelocity(0,0);

        // Show info panel for objects
        if(isObj && typeof window.showInfoPanel === 'function') {
          window.showInfoPanel(this.labColor, def.name, def.desc, def.emoji||'*', def.tags||[], def.actionUrl || '', def.ctaText || '');
        }

        this.showDialoguePage(idx, 0, isObj);
      }

      showDialoguePage(idx, page, isObj) {
        var def = isObj ? this.mapObjects[idx] : this.npcDefs[idx];
        var pages = isObj ? [def.dialoguePage1||def.name, def.dialoguePage2||def.desc] : def.pages;
        if(page >= pages.length) { this.closeDialogue(idx, isObj); return; }
        this.dlgPanel.setVisible(true).clear();
        this.dlgPanel.fillStyle(0x050508, 0.95); this.dlgPanel.fillRect(0,500,800,100);
        this.dlgPanel.lineStyle(2, this.labColorHex, 1); this.dlgPanel.lineBetween(0,500,800,500);
        this.dlgText.setVisible(true).setText('');
        this.npcNameText.setVisible(true).setText(def.name||'');
        this.dlgArrow.setVisible(false);
        var full = pages[page];
        this.dialogueTyping=true; this.dialogueCharIdx=0; this.dialogueTarget=full;
        var self = this;
        if (this.typewriterTimer) this.typewriterTimer.destroy();
        this.typewriterTimer = this.time.addEvent({
          delay:30, repeat:full.length-1,
          callback: function() {
            self.dialogueCharIdx++;
            self.dlgText.setText(full.substring(0, self.dialogueCharIdx));
            if (self.dialogueCharIdx%4===0) playNote(400+Math.random()*100, 0.03, 'square', 0.05);
            if (self.dialogueCharIdx>=full.length) { self.dialogueTyping=false; self.dlgArrow.setVisible(true); }
          }
        });
      }

      advanceDialogue() {
        if (!this.dialogueOpen) return;
        var isObj = this.activeObjIdx >= 0;
        var idx = isObj ? this.activeObjIdx : this.activeNpcIdx;
        if (this.dialogueTyping) {
          if (this.typewriterTimer) this.typewriterTimer.destroy();
          this.dlgText.setText(this.dialogueTarget);
          this.dialogueTyping=false; this.dlgArrow.setVisible(true); return;
        }
        this.dialoguePage++;
        var def = isObj ? this.mapObjects[idx] : this.npcDefs[idx];
        var pages = isObj ? [def.dialoguePage1||def.name, def.dialoguePage2||def.desc] : def.pages;
        if (this.dialoguePage >= pages.length) this.closeDialogue(idx, isObj);
        else this.showDialoguePage(idx, this.dialoguePage, isObj);
      }

      closeDialogue(idx, isObj) {
        this.dialogueOpen=false;
        this.dlgPanel.setVisible(false); this.dlgText.setVisible(false);
        this.dlgArrow.setVisible(false); this.npcNameText.setVisible(false);
        if (this.typewriterTimer) this.typewriterTimer.destroy();
        var seen = isObj ? ('obj_'+idx) : ('npc_'+idx);
        if (!this.dialogueSeen[seen]) {
          this.dialogueSeen[seen]=true; this.npcCount++;
          this.updateHudBar();
          this.hudNpcText.setText(this.npcCount+'/'+this.totalNpcs);
          var def = isObj ? this.mapObjects[idx] : this.npcDefs[idx];
          var fx = isObj ? def.x : def.tile[0]*32+16;
          var fy = isObj ? (def.y+24) : (def.tile[1]*32+16+24);
          var ft = this.add.text(fx, fy-30, '+1 SENAL', {fontFamily:'"Pixelify Sans"',fontSize:'7px',color:'#ffcc00'}).setDepth(50).setOrigin(0.5);
          this.tweens.add({ targets:ft, y:fy-80, alpha:0, duration:1500, onComplete:function(){ft.destroy();} });
          playNote(880,0.1,'sine',0.25,0); playNote(1100,0.1,'sine',0.25,0.1);
          if (this.npcCount>=this.totalNpcs) {
            this.chestLocked=false;
            var cx2=this.chestTile[0]*32+16, cy2=this.chestTile[1]*32+16+24;
            var ut = this.add.text(cx2, cy2-50, '!COFRE DESBLOQUEADO!', {fontFamily:'"Pixelify Sans"',fontSize:'7px',color:this.labColor}).setDepth(50).setOrigin(0.5);
            this.tweens.add({ targets:ut, y:cy2-100, alpha:0, duration:2500, onComplete:function(){ut.destroy();} });
            playNote(523,0.15,'sine',0.3,0); playNote(659,0.15,'sine',0.3,0.15);
            playNote(784,0.15,'sine',0.3,0.3); playNote(1047,0.3,'sine',0.3,0.45);
          }
        }
      }

      update() {
        if (this.dialogueOpen) {
          this.player.setVelocity(0,0);
          this.player.anims.play('idle',true);
          if (Phaser.Input.Keyboard.JustDown(this.spaceKey)) this.advanceDialogue();
          return;
        }
        var speed=120;
        var cursors=this.cursors, wasd=this.wasd;
        this.player.setVelocity(0,0);
        if (cursors.left.isDown||wasd.A.isDown) { this.player.setVelocityX(-speed); this.player.anims.play('walk-left',true); }
        else if (cursors.right.isDown||wasd.D.isDown) { this.player.setVelocityX(speed); this.player.anims.play('walk-right',true); }
        else if (cursors.up.isDown||wasd.W.isDown) { this.player.setVelocityY(-speed); this.player.anims.play('walk-up',true); }
        else if (cursors.down.isDown||wasd.S.isDown) { this.player.setVelocityY(speed); this.player.anims.play('walk-down',true); }
        else { this.player.anims.play('idle',true); }

        this.stepTimer++;
        var moving=cursors.left.isDown||cursors.right.isDown||cursors.up.isDown||cursors.down.isDown||wasd.A.isDown||wasd.D.isDown||wasd.W.isDown||wasd.S.isDown;
        if (moving && this.stepTimer%20===0) playNote(80+Math.random()*20,0.05,'square',0.05);

        // NPC proximity
        var self = this;
        this.nearNpc=-1;
        this.npcZones.forEach(function(zone,idx) {
          var d=Phaser.Math.Distance.Between(self.player.x,self.player.y,zone.x,zone.y);
          if (d<44) {
            self.nearNpc=idx;
            if (!self.npcBubbles[idx].visible && !self.dialogueSeen['npc_'+idx]) {
              self.npcBubbles[idx].setVisible(true).play('bubble_pulse');
            }
          } else {
            if (self.npcBubbles[idx].visible) self.npcBubbles[idx].setVisible(false);
          }
        });

        // Object proximity
        this.nearObj=-1;
        this.mapObjectZones.forEach(function(zone,idx) {
          var d=Phaser.Math.Distance.Between(self.player.x,self.player.y,zone.x,zone.y);
          if (d<52) {
            self.nearObj=idx;
          }
        });

        // Chest zone
        var cd=Phaser.Math.Distance.Between(this.player.x,this.player.y,this.chestZone.x,this.chestZone.y);
        this.nearChest=cd<54;
        this.chestPrompt.setVisible(this.nearChest&&!this.chestOpened);

        if (Phaser.Input.Keyboard.JustDown(this.spaceKey)) {
          if (this.nearChest&&!this.chestOpened) {
            if (this.chestLocked) {
              var msg=this.add.text(this.chestZone.x,this.chestZone.y-60,'Habla con todos primero!',{fontFamily:'"Pixelify Sans"',fontSize:'6px',color:'#ff4444',align:'center'}).setDepth(50).setOrigin(0.5);

              playNote(200,0.2,'square',0.2);
            } else {
              this.chestOpened=true;
              this.chest.play('chest_open');
              this.chestPrompt.setVisible(false);
              playNote(523.25,0.15,'square',0.3,0); playNote(659.25,0.15,'square',0.3,0.15);
              playNote(783.99,0.15,'square',0.3,0.3); playNote(1046.5,0.25,'square',0.3,0.45);
              var mapKey=this.scene.key;
              var self2=this;
              this.time.delayedCall(800, function() {
                self2.scene.launch('ChestScene',Object.assign({},self2.chestData,{labColor:self2.labColor,labColorHex:self2.labColorHex,mapSceneKey:mapKey}));
                self2.scene.pause();
              });
            }
          } else if (this.nearObj>=0) {
            this.openDialogue(this.nearObj, true);
          } else if (this.nearNpc>=0) {
            this.openDialogue(this.nearNpc, false);
          }
        }
      }
    }

      }
      mkBtn(x,y,lbl,filled,cb) {
        var bw=300,bh=32,lh=this.labColorHex,lc=this.labColor;
        var bg=this.add.graphics();
        if(filled){bg.fillStyle(lh,1);bg.fillRect(x-bw/2,y-bh/2,bw,bh);}
        else{bg.fillStyle(0x050508,1);bg.fillRect(x-bw/2,y-bh/2,bw,bh);bg.lineStyle(1,lh,1);bg.strokeRect(x-bw/2,y-bh/2,bw,bh);}
        this.add.text(x,y,lbl,{fontFamily:'"Pixelify Sans"',fontSize:'8px',color:filled?'#000000':lc}).setOrigin(0.5);
        var hit=this.add.rectangle(x,y,bw,bh,0,0).setInteractive();
        hit.on('pointerover',function(){playNote(880,0.03,'square',0.1);});
        hit.on('pointerdown',cb);
      }
    }

    // ─────────────────────────────────────────────
    // PHASER GAME CONFIG
    // ─────────────────────────────────────────────
    if (!window._aetherGameInstance) {
      var config = {
        type: Phaser.AUTO,
        width: 800, height: 600,
        backgroundColor: '#050508',
        pixelArt: true, roundPixels: true,
        parent: 'game-container',
        physics: { default:'arcade', arcade:{ gravity:{y:0}, debug:false } },
        scale: { mode:Phaser.Scale.FIT, autoCenter:Phaser.Scale.CENTER_BOTH },
        scene: [PreloadScene, BootScene, LabSelectScene, CreativeMapScene, SystemsMapScene, SchoolMapScene, ChestScene, CTAScene]
      };
      window._aetherGameInstance = new Phaser.Game(config);
    }
  </script>
